<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Vogelstimmen Trainer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
text-align:center;
background:#f0f0f0;
}

/* STARTSEITE */

#startScreen{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:40px;
background-image:url("Startseite.png");
background-size:cover;
background-position:center;
}

.startButton{
font-size:55px;
font-weight:bold;
color:white;
padding:35px 100px;
border-radius:25px;
border:none;
cursor:pointer;
box-shadow:0 10px 0 rgba(0,0,0,0.5),0 18px 30px rgba(0,0,0,0.4);
}

.learnBtn{background:linear-gradient(#2ecc71,#1e8449);}
.quizBtn{background:linear-gradient(#3498db,#1f618d);}
.expertBtn{background:linear-gradient(#f39c12,#d35400);}
.scoreBtn{background:linear-gradient(#9b59b6,#6c3483);}

/* SPIEL */

#game{
display:none;
padding-top:20px;
}

.bigButton{
font-size:28px;
padding:18px 40px;
border-radius:15px;
border:none;
background:#444;
color:white;
cursor:pointer;
margin:10px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
width:95%;
margin:auto;
margin-top:20px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
cursor:pointer;
display:flex;
flex-direction:column;
align-items:center;
}

.card img{
max-width:100%;
height:auto;
display:block;
margin:auto;
}

.name{
font-size:24px;
font-weight:bold;
margin-top:10px;
}

.expertButton{
font-size:28px;
padding:35px;
border-radius:20px;
border:none;
background:#e67e22;
color:white;
cursor:pointer;
}

.correct{background:#2ecc71 !important;color:white;}
.wrong{background:#e74c3c !important;color:white;}

#points{
font-size:50px;
font-weight:bold;
}

.progressContainer{
width:90%;
height:60px;
background:#ddd;
border-radius:30px;
margin:20px auto;
overflow:hidden;
}

.progressBar{
height:100%;
width:0%;
background:linear-gradient(90deg,#00c6ff,#0072ff);
}

#correctBirdBox{
display:none;
margin-top:20px;
}

#correctBirdBox img{
width:250px;
border-radius:20px;
}

/* HIGHSCORE */

#highscoreScreen{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
color:white;
justify-content:center;
align-items:center;
flex-direction:column;
}

#highscoreList{
font-size:32px;
margin:20px;
}

/* ENDSCREEN */

#endScreen{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url("Startseite.png");
background-size:cover;
background-position:center;
justify-content:center;
align-items:center;
flex-direction:column;
}

.endBox{
background:rgba(0,0,0,0.7);
padding:40px;
border-radius:25px;
color:white;
width:500px;
max-width:90%;
}

#finalScore{
font-size:70px;
margin-bottom:20px;
}

#nameInput{
font-size:26px;
padding:10px;
border-radius:10px;
border:none;
margin:15px;
width:250px;
}

#highscoreEnd{
margin-top:20px;
font-size:28px;
}

</style>

</head>

<body>

<div id="startScreen">

<button class="startButton learnBtn" onclick="startGame('learn')">Lernen</button>
<button class="startButton quizBtn" onclick="startGame('quiz')">Quiz</button>
<button class="startButton expertBtn" onclick="startGame('expert')">Expertenmodus</button>
<button class="startButton scoreBtn" onclick="showHighscores()">🏆 Highscore</button>

</div>

<div id="highscoreScreen">

<h1>🏆 Klassen Highscore</h1>

<div id="highscoreList">Lade Highscore...</div>

<button class="bigButton" onclick="closeHighscores()">Schließen</button>

</div>

<div id="game">

<button class="bigButton" onclick="goBack()">⬅ Zurück</button>

<div id="points">Punkte: 0 / 15</div>

<div class="progressContainer">
<div class="progressBar" id="progressBar"></div>
</div>

<button class="bigButton" onclick="repeatSound()">🔁 Vogelruf wiederholen</button>

<div id="correctBirdBox">
<img id="correctBirdImage">
<div id="correctBirdName"></div>
</div>

<div class="container" id="birdContainer"></div>

</div>

<div id="endScreen">

<div class="endBox">

<h2>Dein Ergebnis</h2>

<div id="finalScore"></div>

<input id="nameInput" placeholder="Dein Name">

<button class="bigButton" onclick="saveScore()" id="saveButton">Score speichern</button>

<div id="highscoreEnd"></div>

<button class="bigButton" onclick="location.reload()">Nochmal spielen</button>

</div>

</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxpeHmvAqfvavf0ErpkFtBkHAqPFHnN7o4vEPw34IJYSKCNInvwwc4R0A8O2urvzt07rQ/exec";

let birds=[];
let currentBird="";
let lastBird="";
let points=0;
let rounds=0;
let maxRounds=15;
let mode="quiz";
let scoreSaved=false;

function capitalize(t){
return t.charAt(0).toUpperCase()+t.slice(1);
}

/* VÖGEL LADEN */

fetch("birds.json")
.then(res=>res.json())
.then(data=>{
birds=data;
loadBirdSounds();
createCards();
});

/* AUDIO ERZEUGEN */

function loadBirdSounds(){

birds.forEach(b=>{

let audio=document.createElement("audio");
audio.id=b;
audio.src=b+".mp3";

document.body.appendChild(audio);

});

}

function startGame(selectedMode){

mode=selectedMode;
points=0;
rounds=0;
scoreSaved=false;

document.getElementById("startScreen").style.display="none";
document.getElementById("game").style.display="block";

createCards();

if(mode!=="learn") nextRound();

}

function goBack(){

stopAllSounds();

document.getElementById("game").style.display="none";
document.getElementById("startScreen").style.display="flex";

}

function createCards(){

let container=document.getElementById("birdContainer");
container.innerHTML="";

birds.forEach(b=>{

let name=capitalize(b);

if(mode==="expert"){

let btn=document.createElement("button");
btn.className="expertButton";
btn.innerText=name;
btn.onclick=()=>birdClicked(b,btn);

container.appendChild(btn);

}else{

let card=document.createElement("div");
card.className="card";
card.innerHTML="<img src='"+b+".jpg'><div class='name'>"+name+"</div>";
card.onclick=()=>birdClicked(b,card);

container.appendChild(card);

}

});

}

function stopAllSounds(){
document.querySelectorAll("audio").forEach(a=>{
a.pause();
a.currentTime=0;
});
}

function nextRound(){

stopAllSounds();

let newBird;

do{
let randomIndex=Math.floor(Math.random()*birds.length);
newBird=birds[randomIndex];
}
while(newBird===lastBird && birds.length>1);

currentBird=newBird;
lastBird=newBird;

document.getElementById(currentBird).play();

}

function repeatSound(){
stopAllSounds();
document.getElementById(currentBird).play();
}

function birdClicked(bird,element){

if(mode==="learn"){
stopAllSounds();
document.getElementById(bird).play();
return;
}

stopAllSounds();

if(bird===currentBird){
element.classList.add("correct");
points++;
}else{
element.classList.add("wrong");

document.getElementById("correctBirdImage").src=currentBird+".jpg";
document.getElementById("correctBirdName").innerHTML=capitalize(currentBird);

document.getElementById("correctBirdBox").style.display="block";
}

rounds++;

document.getElementById("points").innerHTML="Punkte: "+points+" / "+maxRounds;

document.getElementById("progressBar").style.width=(rounds/maxRounds*100)+"%";

setTimeout(()=>{

document.querySelectorAll(".card,.expertButton").forEach(el=>{
el.classList.remove("correct");
el.classList.remove("wrong");
});

document.getElementById("correctBirdBox").style.display="none";

if(rounds>=maxRounds){
endGame();
}else{
nextRound();
}

},4000);

}

function endGame(){

document.getElementById("game").style.display="none";
document.getElementById("endScreen").style.display="flex";

document.getElementById("finalScore").innerHTML="🏆 "+points+" / "+maxRounds;

loadHighscoreEnd();

}

function saveScore(){

if(scoreSaved) return;

let name=document.getElementById("nameInput").value.trim();
if(!name) return;

scoreSaved=true;

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
name:name,
score:points
})
});

document.getElementById("saveButton").innerText="Gespeichert ✔";

setTimeout(loadHighscoreEnd,800);

}

function loadHighscoreEnd(){

fetch(SCRIPT_URL)

.then(res=>res.json())

.then(data=>{

let html="<h3>🏆 Highscore</h3>";

data.forEach((h,i)=>{

let medal=i==0?"🥇":i==1?"🥈":i==2?"🥉":"";

html+=medal+" "+h[0]+" — "+h[1]+" Punkte<br>";

});

document.getElementById("highscoreEnd").innerHTML=html;

});

}

function showHighscores(){

document.getElementById("highscoreScreen").style.display="flex";

fetch(SCRIPT_URL)

.then(res=>res.json())

.then(data=>{

let html="";

data.forEach((h,i)=>{

let medal=i==0?"🥇":i==1?"🥈":i==2?"🥉":"";

html+=medal+" "+h[0]+" — "+h[1]+" Punkte<br>";

});

document.getElementById("highscoreList").innerHTML=html;

});

}

function closeHighscores(){
document.getElementById("highscoreScreen").style.display="none";
}

</script>

</body>
</html>
